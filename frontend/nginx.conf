server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    add_header X-Frame-Options "DENY";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; connect-src 'self' https://*.auth0.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://flagcdn.com;";

    location / {
        try_files $uri $uri/ /index.html;
    }
}
